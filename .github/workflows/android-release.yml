name: Build and Sign Android Release

on:
  push:
    tags:
      - 'v*' # اجرای گردش کار با ثبت تگ‌های نسخه (به عنوان مثال v1.0.0)
  workflow_dispatch: # فعال‌سازی امکان راه‌اندازی دستی در منوی گیت‌هاب اکشنز

permissions:
  contents: write # پیش‌نیاز مجازسازی ایجاد ریلیز و آپلود فایل‌های اجرایی

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Find Unsigned Release APK
        id: find-apk
        run: |
          # جستجو جهت یافتن فایل خام ریلیز که توسط گریدل کامپایل شده است
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" ! -name "*signed*" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: No APK found!"
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Decode Keystore
        id: decode-keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          # حذف شکستگی خطوط و کاراکترهای مخفی و دکود مستقیم به فایل باینری
          echo "$KEYSTORE_BASE64" | tr -d '\r \n' | base64 --decode > app/release-key.jks
          if [ ! -s app/release-key.jks ]; then
            echo "Error: Decoded keystore is empty or corrupt!"
            exit 1
          fi

      - name: Sign Release APK
        id: sign-apk
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # موقعیت‌یابی خودکار ابزار رسمی apksigner بر اساس نسخه‌های نصب‌شده کیت اندروید
          APKSIGNER_PATH=$(find $ANDROID_SDK_ROOT/build-tools/ -name "apksigner" | sort -V | tail -n 1)
          if [ -z "$APKSIGNER_PATH" ]; then
            echo "Error: apksigner not found in SDK build-tools!"
            exit 1
          fi
          echo "Using apksigner: $APKSIGNER_PATH"
          
          # استفاده از ارجاع متغیرها به فرمت env:VAR جهت جلوگیری از تداخل کاراکترهای خاص با لینوکس
          $APKSIGNER_PATH sign \
            --ks app/release-key.jks \
            --ks-pass env:KEYSTORE_PASSWORD \
            --key-pass env:KEY_PASSWORD \
            --ks-key-alias "$KEY_ALIAS" \
            --out app/build/outputs/apk/release/Telegram-Proxy-Checker-Signed.apk \
            ${{ env.APK_PATH }}
            
          # راستی‌آزمایی یکپارچگی گواهی فایل امضا شده
          $APKSIGNER_PATH verify --verbose app/build/outputs/apk/release/Telegram-Proxy-Checker-Signed.apk

      - name: Create GitHub Release and Upload Signed APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/release/Telegram-Proxy-Checker-Signed.apk
          name: Telegram Proxy Checker ${{ github.ref_name }}
          body: |
            ### اطلاعات انتشار نسخه
            - **نسخه انتشار**: `${{ github.ref_name }}`
            - **وضعیت نسخه**: محصول امضا شده نهایی
            - **اعتبارسنجی**: تایید شده با ابزار رسمی Android apksigner
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
