name: Generate Android Release

on:
  workflow_dispatch: # امکان اجرای دستی از تب Actions در گیت‌هاب
  push:
    tags:
      - 'v*' # اجرای خودکار در صورت ثبت تگ جدید مثل v1.0.1

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Generate and Set Up Gradle Wrapper
        run: |
          # تولید اجباری و تضمینی گریدل نسخه 8.5 سازگار با پلاگین اندروید 8.2.2
          echo "Generating Gradle wrapper with compatible version 8.5..."
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Update Versioning in Build Gradle
        run: |
          # جایگزینی کدهای نسخه‌گذاری پیش‌فرض با مقادیر داینامیک گیت‌هاب جهت خوانایی سیستم Obtainium
          RUN_NUMBER="${{ github.run_number }}"
          sed -i "s/versionCode = 1/versionCode = $RUN_NUMBER/g" app/build.gradle.kts
          sed -i "s/versionName = \"1.0.0\"/versionName = \"1.0.$RUN_NUMBER\"/g" app/build.gradle.kts
          echo "Building Version: 1.0.$RUN_NUMBER (Code: $RUN_NUMBER)"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Prepare Keystore File
        run: |
          # کلید امضای اختصاصی و پایدار تولید شده برای این پروژه
          # این کلید به شما اجازه می‌دهد نسخه‌های جدیدتر را روی نسخه‌های قبلی بدون خطا آپدیت کنید
          echo "" | base64 --decode > release.keystore

      - name: Sign APK with apksigner
        run: |
          # یافتن پویای ابزار رسمی apksigner در رانر اوبونتو
          APKSIGNER_PATH=$(find $ANDROID_HOME/build-tools -name apksigner | sort -V | tail -n 1)
          
          # امضا کردن خروجی گریدل با کلید پایدار
          $APKSIGNER_PATH sign \
            --ks release.keystore \
            --ks-key-alias release \
            --ks-pass pass:telegramchecker \
            --key-pass pass:telegramchecker \
            --out app-release-signed.apk \
            app/build/outputs/apk/release/app-release-unsigned.apk
            
          # بررسی درستی امضای دیجیتال
          $APKSIGNER_PATH verify app-release-signed.apk

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v1.0.${{ github.run_number }}"
          name: "TG Proxy Checker v1.0.${{ github.run_number }}"
          draft: false
          prerelease: false
          body: |
            ## Telegram Proxy Checker - v1.0.${{ github.run_number }}
            
            ### What's New:
            - Fully upgraded Kotlin codebase with highly optimized low-level TCP sockets.
            - Auto-updating mechanism compatible with **Obtainium**.
            - Built-in multi-threaded verification with custom Concurrency and Timeout options.
            - Automatic filtration of old/dead subscription links (> 7 days stale).
            
            **Installation Note:** This APK is signed with a persistent signature key. You can install it on top of any previous version from this repository without uninstalling.
          files: |
            app-release-signed.apk
