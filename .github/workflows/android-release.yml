name: Build and Sign Android Release

on:
  push:
    tags:
      - 'v*' # اجرای گردش کار با ثبت تگ‌های نسخه (به عنوان مثال v1.0.0)
  workflow_dispatch: # فعال‌سازی امکان راه‌اندازی دستی در منوی گیت‌هاب اکشنز

permissions:
  contents: write # پیش‌نیاز مجازسازی ایجاد ریلیز و آپلود فایل‌های اجرایی

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle Environment
        run: |
          # جستجوی پویای فایل تنظیمات توزیع گریدل در پروژه
          WRAPPER_PROPERTIES=$(find . -name "gradle-wrapper.properties" | head -n 1)
          
          if [ -n "$WRAPPER_PROPERTIES" ]; then
            echo "Modifying existing gradle-wrapper.properties to use stable Gradle 8.7..."
            # تغییر آدرس توزیع گریدل به نسخه پایدار و کاملاً سازگار 8.7
            sed -i 's/distributions\/gradle-.*-bin.zip/distributions\/gradle-8.7-bin.zip/g' "$WRAPPER_PROPERTIES"
            sed -i 's/distributions\/gradle-.*-all.zip/distributions\/gradle-8.7-all.zip/g' "$WRAPPER_PROPERTIES"
          fi

          # جستجوی پویای فایل اجرای گریدل (gradlew) در کل ساختار دایرکتوری مخزن شما
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          if [ -n "$GRADLEW_PATH" ]; then
            echo "Found gradlew at: $GRADLEW_PATH"
            chmod +x "$GRADLEW_PATH"
            GRADLE_DIR=$(dirname "$GRADLEW_PATH")
            echo "GRADLE_DIR=$GRADLE_DIR" >> $GITHUB_ENV
          else
            echo "gradlew not found in repository. Generating wrapper using system gradle with stable version 8.7..."
            # تولید مجدد Wrapper با قید صریح نسخه سازگار و باثبات 8.7
            gradle wrapper --gradle-version 8.7
            chmod +x gradlew
            echo "GRADLE_DIR=." >> $GITHUB_ENV
          fi

      - name: Build Release APK
        run: |
          cd ${{ env.GRADLE_DIR }}
          ./gradlew assembleRelease --no-daemon

      - name: Find Unsigned Release APK
        id: find-apk
        run: |
          # پیدا کردن فایل APK نهایی بدون محدودیت ساختار پوشه‌بندی
          APK_PATH=$(find . -path "*/build/outputs/apk/release/*.apk" ! -name "*signed*" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: No release APK found!"
            exit 1
          fi
          echo "Found APK at: $APK_PATH"
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV

      - name: Decode Keystore
        id: decode-keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          # دیکد کردن امن کی‌استور در دایرکتوری اصلی پروژه گریدل یافت شده
          echo "$KEYSTORE_BASE64" | tr -d '\r \n' | base64 --decode > ${{ env.GRADLE_DIR }}/release-key.jks
          if [ ! -s ${{ env.GRADLE_DIR }}/release-key.jks ]; then
            echo "Error: Decoded keystore is empty or corrupt!"
            exit 1
          fi

      - name: Sign Release APK
        id: sign-apk
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # موقعیت‌یابی پویای ابزار رسمی apksigner در رانر اوبونتو
          APKSIGNER_PATH=$(find $ANDROID_SDK_ROOT/build-tools/ -name "apksigner" | sort -V | tail -n 1)
          if [ -z "$APKSIGNER_PATH" ]; then
            echo "Error: apksigner not found in SDK build-tools!"
            exit 1
          fi
          echo "Using apksigner: $APKSIGNER_PATH"
          
          # امضا کردن امن فایل خروجی بدون مواجهه با خطای تفسیر کاراکترهای شل اوبونتو
          $APKSIGNER_PATH sign \
            --ks ${{ env.GRADLE_DIR }}/release-key.jks \
            --ks-pass env:KEYSTORE_PASSWORD \
            --key-pass env:KEY_PASSWORD \
            --ks-key-alias "$KEY_ALIAS" \
            --out ${{ env.GRADLE_DIR }}/Telegram-Proxy-Checker-Signed.apk \
            ${{ env.APK_PATH }}
            
          # راستی‌آزمایی امضا
          $APKSIGNER_PATH verify --verbose ${{ env.GRADLE_DIR }}/Telegram-Proxy-Checker-Signed.apk

      - name: Create GitHub Release and Upload Signed APK
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ env.GRADLE_DIR }}/Telegram-Proxy-Checker-Signed.apk
          name: Telegram Proxy Checker ${{ github.ref_name }}
          body: |
            ### اطلاعات انتشار نسخه
            - **نسخه انتشار**: `${{ github.ref_name }}`
            - **وضعیت نسخه**: محصول امضا شده نهایی
            - **اعتبارسنجی**: تایید شده با ابزار رسمی Android apksigner
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
